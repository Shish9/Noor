name: quran_app
description: "Noor — A premium modern Islamic app for Quran reading, duas, and daily spiritual engagement."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # UI / Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0

  # Audio
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.21
  audio_service: ^0.18.15

  # HTTP / Data
  http: ^1.2.2
  dio: ^5.4.3+1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # Sharing
  share_plus: ^9.0.0
  screenshot: ^3.0.0
  image_gallery_saver_plus: ^3.0.5

  # Location / Time
  geolocator: ^12.0.0
  adhan_dart: ^2.0.0
  intl: ^0.19.0

  # Misc
  url_launcher: ^6.3.0
  flutter_secure_storage: ^9.2.2
  package_info_plus: ^8.0.0
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/

  # Arabic fonts — uncomment after dropping the .ttf files into assets/fonts/.
  # See assets/fonts/README.md for free download links (SIL Open Font License).
  # fonts:
  #   - family: Amiri
  #     fonts:
  #       - asset: assets/fonts/Amiri-Regular.ttf
  #       - asset: assets/fonts/Amiri-Bold.ttf
  #         weight: 700
  #   - family: ScheherazadeNew
  #     fonts:
  #       - asset: assets/fonts/ScheherazadeNew-Regular.ttf
  #       - asset: assets/fonts/ScheherazadeNew-Bold.ttf
  #         weight: 700
