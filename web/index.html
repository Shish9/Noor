<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A premium modern Islamic app for Quran reading, duas, and daily spiritual engagement.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Noor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Noor</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Aggressively kill any service worker from previous builds — they were
    // serving stale broken Dart code and leaving the page blank. We can
    // re-enable a fresh worker for production via flutter build web.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(rs => {
        rs.forEach(r => r.unregister());
      });
      if ('caches' in window) {
        caches.keys().then(ks => ks.forEach(k => caches.delete(k)));
      }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
